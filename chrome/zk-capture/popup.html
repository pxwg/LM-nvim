<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ZK Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img src="icon.svg" alt="" />
      <div>
        <h1>ZK Capture</h1>
        <p>Lightweight Zotero-style capture</p>
      </div>
    </header>
    <main>
      <button id="auto">Auto capture current tab</button>
      <button id="page">Capture as web page</button>
      <button id="pdf">Capture current tab as PDF</button>
      <button id="ping" class="secondary">Test native host</button>
      <pre id="status">Ready</pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
